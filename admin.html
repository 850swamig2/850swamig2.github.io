<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Divination Intake Review | Your Babalawo</title>
  <style>
    :root{
      --bg:#080604;--card:#15100c;--field:#0d0a08;--gold:#d4af37;
      --gold2:#f4df95;--text:#fff4cc;--muted:#cdbf91;--line:rgba(255,255,255,.15);
      --ok:#a7efbd;--bad:#ffb1b1;--max:1100px
    }
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at top left,rgba(212,175,55,.16),transparent 30rem),var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.55}
    .wrap{width:min(var(--max),calc(100% - 28px));margin:auto;padding:30px 0 60px}
    h1{margin:0 0 8px;color:var(--gold2)}
    .muted{color:var(--muted)}
    .login,.record{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 18px 50px rgba(0,0,0,.35)}
    .login{display:grid;grid-template-columns:1fr auto;gap:12px;margin:24px 0}
    input,button{min-height:48px;border-radius:12px;font:inherit}
    input{width:100%;padding:11px 13px;background:var(--field);color:var(--text);border:1px solid var(--line)}
    button{padding:0 18px;border:1px solid rgba(212,175,55,.7);background:linear-gradient(135deg,var(--gold),var(--gold2));font-weight:800;cursor:pointer}
    button:disabled{opacity:.6;cursor:wait}
    #status{margin:14px 0;white-space:pre-line}
    .error{color:var(--bad)}.success{color:var(--ok)}
    .records{display:grid;gap:16px}
    .record h2{margin:0 0 5px;color:var(--gold2);font-size:1.2rem}
    .meta{display:flex;flex-wrap:wrap;gap:8px 18px;color:var(--muted);font-size:.92rem;margin-bottom:14px}
    .section{border-top:1px solid var(--line);padding-top:13px;margin-top:13px}
    .section h3{margin:0 0 7px;font-size:1rem;color:var(--gold2)}
    .section p{margin:5px 0;white-space:pre-wrap}
    .label{color:var(--muted);font-weight:700}
    @media(max-width:650px){.login{grid-template-columns:1fr}.login button{width:100%}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Divination Intake Review</h1>
    <p class="muted">Private SwamiG Institute review page. The token is kept only in this open browser tab.</p>

    <div class="login">
      <input id="token" type="password" autocomplete="current-password" placeholder="Enter ADMIN_TOKEN">
      <button id="loadButton" type="button">Load Intakes</button>
    </div>

    <div id="status" role="status" aria-live="polite"></div>
    <section id="records" class="records"></section>
  </main>

  <script>
    (() => {
      "use strict";

      const tokenInput = document.getElementById("token");
      const loadButton = document.getElementById("loadButton");
      const status = document.getElementById("status");
      const records = document.getElementById("records");

      function text(value) {
        return value === null || value === undefined || value === ""
          ? "Not provided"
          : String(value);
      }

      function paragraph(label, value) {
        const p = document.createElement("p");
        const strong = document.createElement("span");
        strong.className = "label";
        strong.textContent = label + ": ";
        p.append(strong, document.createTextNode(text(value)));
        return p;
      }

      function section(title, entries) {
        const box = document.createElement("div");
        box.className = "section";

        const heading = document.createElement("h3");
        heading.textContent = title;
        box.appendChild(heading);

        entries.forEach(([label, value]) => {
          box.appendChild(paragraph(label, value));
        });

        return box;
      }

      function renderIntake(intake) {
        const card = document.createElement("article");
        card.className = "record";

        const heading = document.createElement("h2");
        heading.textContent = intake.full_name || "Unnamed client";

        const meta = document.createElement("div");
        meta.className = "meta";

        const date = intake.created_at
          ? new Date(intake.created_at).toLocaleString()
          : "Unknown date";

        [
          "Confirmation: " + text(intake.intake_id),
          "Submitted: " + date,
          "Status: " + text(intake.status)
        ].forEach((item) => {
          const span = document.createElement("span");
          span.textContent = item;
          meta.appendChild(span);
        });

        card.append(heading, meta);

        card.appendChild(section("Client", [
          ["Email", intake.email],
          ["Phone", intake.phone],
          ["Location", intake.location],
          ["Preferred contact", intake.contact_method]
        ]));

        card.appendChild(section("Spiritual Background", [
          ["Received Ifá divination before", intake.ifa_before],
          ["Received Tehuti divination before", intake.tehuti_before],
          ["Initiation status", intake.initiation_status],
          ["Godparent, elder, or house", intake.spiritual_house]
        ]));

        card.appendChild(section("Divination Request", [
          ["Concern category", intake.concern_type],
          ["Primary concern", intake.main_concern],
          ["Why now", intake.why_now],
          ["Question 1", intake.question_1],
          ["Question 2", intake.question_2],
          ["Question 3", intake.question_3]
        ]));

        records.appendChild(card);
      }

      async function loadIntakes() {
        const token = tokenInput.value.trim();

        if (!token) {
          status.className = "error";
          status.textContent = "Enter the ADMIN_TOKEN.";
          tokenInput.focus();
          return;
        }

        loadButton.disabled = true;
        loadButton.textContent = "Loading…";
        status.className = "";
        status.textContent = "Loading protected records…";
        records.innerHTML = "";

        try {
          const response = await fetch("/api/intakes", {
            headers: {
              "Accept": "application/json",
              "Authorization": "Bearer " + token
            },
            cache: "no-store"
          });

          const result = await response.json().catch(() => ({}));

          if (!response.ok || !result.ok) {
            throw new Error(result.error || "The records could not be loaded.");
          }

          const intakes = Array.isArray(result.intakes) ? result.intakes : [];

          status.className = "success";
          status.textContent =
            intakes.length === 1
              ? "1 intake loaded."
              : intakes.length + " intakes loaded.";

          intakes.forEach(renderIntake);
        } catch (error) {
          status.className = "error";
          status.textContent = error.message || "The records could not be loaded.";
        } finally {
          loadButton.disabled = false;
          loadButton.textContent = "Load Intakes";
        }
      }

      loadButton.addEventListener("click", loadIntakes);
      tokenInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") loadIntakes();
      });
    })();
  </script>
</body>
</html>
